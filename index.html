<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Primary SEO -->
  <title>Mavrixk Tours & Travels | Best Tour Packages & Travel Services</title>

  <meta name="description"
        content="Mavrixk Tours & Travels offers affordable tour packages, hotel bookings, holiday planning, and travel services. Book your dream trip today!" />

  <meta name="keywords"
        content="Tours and Travels, Travel Agency, Holiday Packages, Hotel Booking, Kashmir Tours, International Tours, Travel Services" />

  <meta name="author" content="Mavrixk Tours & Travels"/>

  <!-- Canonical (VERY IMPORTANT) -->
  <link rel="canonical" href="https://yourdomain.com/" />

  <!-- Robots -->
  <meta name="robots" content="index, follow"/>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />

  <!-- Open Graph (Facebook + WhatsApp) -->
  <meta property="og:title" content="Mavrixk Tours & Travels"/>
  <meta property="og:description"
        content="Explore the world with Mavrixk Tours & Travels. Affordable packages, luxury stays, and unforgettable journeys."/>
  <meta property="og:type" content="website"/>
  <meta property="og:url" content="https://yourdomain.com/"/>
  <meta property="og:image" content="https://yourdomain.com/og-image.jpg"/>

  <!-- Twitter SEO -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="Mavrixk Tours & Travels"/>
  <meta name="twitter:description"
        content="Book amazing travel packages at the best price with Mavrixk Tours & Travels."/>
  <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg"/>

  <!-- Elfsight widget -->
  <script src="https://elfsightcdn.com/platform.js" async></script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
